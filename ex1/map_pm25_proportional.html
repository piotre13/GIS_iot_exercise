
    <!DOCTYPE html>
    <html>
    <head>
        <title>PM2.5 Proportional</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
        <style>#map { height: 100vh; margin: 0; }</style>
    </head>
    <body>
        <div id="map"></div>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script>
            var map = L.map('map').setView([45.05, 7.67], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            L.geoJSON({"type": "FeatureCollection", "features": [{"type": "Feature", "geometry": {"type": "Point", "coordinates": [7.6869, 45.0703]}, "properties": {"sensor_id": "TRN-001", "location": "Piazza Castello", "temperature_c": 22.4, "humidity_pct": 58, "pm25_ugm3": 12.1, "alert": false}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [7.6943, 45.0647]}, "properties": {"sensor_id": "TRN-002", "location": "Piazza Vittorio", "temperature_c": 23.1, "humidity_pct": 61, "pm25_ugm3": 18.4, "alert": false}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [7.6332, 44.998]}, "properties": {"sensor_id": "TRN-003", "location": "Mirafiori", "temperature_c": 21.0, "humidity_pct": 70, "pm25_ugm3": 35.2, "alert": true}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [7.6757, 45.0333]}, "properties": {"sensor_id": "TRN-004", "location": "Lingotto", "temperature_c": 24.5, "humidity_pct": 52, "pm25_ugm3": 22.7, "alert": true}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [7.71, 45.055]}, "properties": {"sensor_id": "TRN-005", "location": "Parco del Po", "temperature_c": 20.8, "humidity_pct": 75, "pm25_ugm3": 8.3, "alert": false}}]}, {
                pointToLayer: function(f, latlng) {
                    return L.circleMarker(latlng, {
                        radius: f.properties.pm25_ugm3 / 3,
                        fillColor: '#e74c3c',
                        color: '#fff', weight: 1, fillOpacity: 0.8
                    });
                }
            }).addTo(map);
        </script>
    </body>
    </html>
